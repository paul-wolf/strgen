# pyproject.toml
[tool.pytest.ini_options]
minversion = "6.0"
norecursedirs = [".venv", ".hypothesis"]
addopts = "-ra -q"
testpaths = [
    "strgen/tests.py",
]

[tool.ruff]
line-length = 120
target-version = "py37"
exclude = [
    ".venv",
    "docs/_build",
    "profile",
]

[tool.ruff.lint]
select = ["E", "F", "B", "C90"]
ignore = [
    "E203",
    "E266",
    "E501",
    "F403",
    "F401",
    "C901",
    "E731",
]

[tool.ruff.lint.mccabe]
max-complexity = 18
